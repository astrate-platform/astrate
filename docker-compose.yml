# Local development stack — M0 ships the database only; the `astrate` service
# joins in M8 (docs/ROADMAP.md §9). Tuning per docs/DESIGN.md §5.4.
#
# Fast T2 iteration against this database instead of per-test containers:
#   make up
#   ASTRATE_TEST_DSN="postgres://astrate:astrate@127.0.0.1:5432/astrate?sslmode=disable" \
#     make test-integration
#
# Credentials below are for local development only.
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - max_connections=50
    environment:
      POSTGRES_DB: astrate
      POSTGRES_USER: astrate
      POSTGRES_PASSWORD: astrate
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astrate -d astrate"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  pgdata:
